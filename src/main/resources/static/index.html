<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>トレーニング管理 - カレンダー</title>

    <!-- flatpickr（カレンダー）CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        #selected-date {
            font-size: 18px;
            margin: 10px 0;
            font-weight: bold;
        }

        .button-area {
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            margin-right: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        /* 記録がある日のマーク */
        .has-training {
            background-color: #ffe4b5 !important;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<h1>トレーニングカレンダー</h1>

<!-- カレンダー -->
<input id="calendar" />

<!-- 選択中の日付 -->
<div id="selected-date">選択中の日付：なし</div>

<!-- ボタン -->
<div class="button-area">
    <button id="btn-record">トレーニング記録</button>
    <button id="btn-detail">トレーニング詳細</button>
    <button id="btn-delete">トレーニング削除</button>
</div>

<script>
    let selectedDate = null;
    let trainingDates = []; // 記録がある日付一覧

    // -----------------------------
    // ① 記録がある日付を取得
    // -----------------------------
    async function loadTrainingDates() {
        try {
            const res = await fetch("http://localhost:8080/trainings");
            const data = await res.json();

            trainingDates = data.map(t => t.date);

            calendar.set("onDayCreate", highlightTrainingDays);
            calendar.redraw();
        } catch (e) {
            console.log("バックエンドが動いていないため、ダミーデータを使用します");
            trainingDates = ["2026-04-20", "2026-04-22"];
        }
    }

    // -----------------------------
    // ② 記録がある日付にマーク
    // -----------------------------
    function highlightTrainingDays(dObj, dStr, fp, dayElem) {
        const dateStr = dayElem.dateObj.toISOString().split("T")[0];
        if (trainingDates.includes(dateStr)) {
            dayElem.classList.add("has-training");
        }
    }

    // -----------------------------
    // ③ カレンダー初期化
    // -----------------------------
    const calendar = flatpickr("#calendar", {
        dateFormat: "Y-m-d",
        onChange: function(selectedDates, dateStr) {
            selectedDate = dateStr;
            document.getElementById("selected-date").textContent =
                "選択中の日付：" + dateStr;
        }
    });

    loadTrainingDates();

    // -----------------------------
    // ④ ボタン動作
    // -----------------------------

    // ★★★ 画面②へ遷移（localStorage で日付を渡す）★★★
    document.getElementById("btn-record").onclick = () => {
        if (!selectedDate) return alert("日付を選択してください");

        localStorage.setItem("selectedDate", selectedDate);
        window.location.href = "select-exercise.html";
    };

    // ★★★ 詳細表示（detail.html へ遷移）★★★
    document.getElementById("btn-detail").onclick = () => {
        if (!selectedDate) return alert("日付を選択してください");

        // 日付を保存
        localStorage.setItem("selectedDate", selectedDate);

        // 詳細画面へ遷移
        window.location.href = "detail.html";
    };

    document.getElementById("btn-delete").onclick = async () => {
        if (!selectedDate) return alert("日付を選択してください");

        const confirmDelete = confirm(selectedDate + " の記録を削除しますか？");
        if (!confirmDelete) return;

        alert("削除APIを呼ぶ想定（実装は後でOK）");
    };
</script>

</body>
</html>
