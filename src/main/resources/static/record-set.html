<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>セット記録</title>

  <style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f6f8;
        padding: 20px;
    }

    h1 {
        margin-bottom: 20px;
    }

    /* カード */
    .card {
        background: #fff;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    /* 日付 */
    .date-box input {
        padding: 10px;
        font-size: 16px;
    }

    /* 種目カード */
    .exercise-card h2 {
        margin-bottom: 10px;
    }

    /* セット */
    .set-row {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
    }

    .set-row input {
        flex: 1;
        padding: 10px;
        font-size: 16px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    /* 削除 */
    .delete-set {
        background: #f44336;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
    }

    /* セット追加 */
    .add-set {
        margin-top: 10px;
        width: 100%;
        padding: 10px;
        border: none;
        background: #2196F3;
        color: white;
        border-radius: 8px;
        cursor: pointer;
    }

    /* 保存ボタン */
    #save-btn {
        width: 100%;
        padding: 15px;
        font-size: 18px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }
  </style>
</head>

<body>

<h1>セット記録</h1>

<!-- 日付 -->
<div class="card date-box">
  <label>日付：</label>
  <input type="date" id="training-date">
</div>

<!-- 種目 -->
<div id="exercise-container"></div>

<button id="save-btn">記録する</button>

<script>
  let selectedExercises = [];
  let exerciseData = [];

  function loadSelectedExercises() {
      const data = JSON.parse(localStorage.getItem("selectedExercises") || "[]");
      selectedExercises = data.map(id => Number(id));
  }

  function setSelectedDate() {
      const savedDate = localStorage.getItem("selectedDate");

      document.getElementById("training-date").value =
          savedDate || new Date().toLocaleDateString("sv-SE");
  }

  async function loadExercises() {
      loadSelectedExercises();

      const res = await fetch("http://localhost:8080/exercises");
      exerciseData = await res.json();

      renderExerciseCards();
  }

  function renderExerciseCards() {
      const container = document.getElementById("exercise-container");
      container.innerHTML = "";

      selectedExercises.forEach(exId => {
          const ex = exerciseData.find(e => e.id === exId);
          if (!ex) return;

          const card = document.createElement("div");
          card.className = "card exercise-card";

          card.innerHTML = `
              <h2>${ex.name}</h2>
              <div class="set-list" id="set-list-${exId}"></div>
              <button class="add-set" onclick="addSet(${exId})">＋ セット追加</button>
          `;

          container.appendChild(card);
          addSet(exId);
      });
  }

  function addSet(exId) {
      const list = document.getElementById(`set-list-${exId}`);

      const div = document.createElement("div");
      div.className = "set-row";

      div.innerHTML = `
          <input type="number" placeholder="kg" class="weight">
          <input type="number" placeholder="回数" class="reps">
          <button class="delete-set" onclick="this.parentElement.remove()">✕</button>
      `;

      list.appendChild(div);
  }

  document.getElementById("save-btn").onclick = async () => {

      const today = document.getElementById("training-date").value;

      const trainingExercises = [];

      selectedExercises.forEach(exId => {
          const rows = document.querySelectorAll(`#set-list-${exId} .set-row`);

          const trainingSets = [];
          let setNumber = 1;

          rows.forEach(row => {
              const weight = row.querySelector(".weight").value;
              const reps = row.querySelector(".reps").value;

              if (weight && reps) {
                  trainingSets.push({
                      setNumber: setNumber++,
                      weight: Number(weight),
                      reps: Number(reps)
                  });
              }
          });

          if (trainingSets.length > 0) {
              trainingExercises.push({
                  exercise: { id: exId },
                  trainingSets: trainingSets
              });
          }
      });

      if (trainingExercises.length === 0) {
          return alert("入力してください");
      }

      await fetch("http://localhost:8080/trainings/bulk", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
              date: today,
              trainingExercises
          })
      });

      alert("保存しました！");
      window.location.href = "index.html";
  };

  window.onload = () => {
      setSelectedDate();
      loadExercises();
  };
</script>

</body>
</html>
