<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>セット記録</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .date-box {
      margin-bottom: 20px;
    }

    .exercise-card {
      border: 1px solid #ccc;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 8px;
      background: #fafafa;
    }

    .set-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .set-row input {
      width: 80px;
      padding: 5px;
    }

    .delete-set {
      background: #ff6666;
      color: white;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 4px;
    }

    .add-set {
      margin-top: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }

    #save-btn {
      margin-top: 30px;
      padding: 12px 20px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>セット記録</h1>

<!-- 日付入力 -->
<div class="date-box">
  <label>
    日付：
    <input type="date" id="training-date">
  </label>
</div>

<div id="exercise-container"></div>

<button id="save-btn">記録する</button>

<script>
  let selectedExercises = [];
  let exerciseData = [];

  // -----------------------------
  // localStorage取得（種目）
  // -----------------------------
  function loadSelectedExercises() {
    try {
      const data = JSON.parse(localStorage.getItem("selectedExercises") || "[]");
      selectedExercises = data.map(id => Number(id));
    } catch (e) {
      console.error("localStorageエラー", e);
      selectedExercises = [];
    }
  }

  // -----------------------------
  // ★ 修正ポイント：選択日付を復元
  // -----------------------------
  function setSelectedDate() {
    const savedDate = localStorage.getItem("selectedDate");

    if (savedDate) {
      document.getElementById("training-date").value = savedDate;
    } else {
      // fallback（念のため）
      document.getElementById("training-date").value =
        new Date().toLocaleDateString("sv-SE");
    }
  }

  // -----------------------------
  // 種目取得
  // -----------------------------
  async function loadExercises() {
    loadSelectedExercises();

    if (selectedExercises.length === 0) {
      alert("種目が選択されていません");
      return;
    }

    try {
      const res = await fetch("http://localhost:8080/exercises");
      exerciseData = await res.json();

      renderExerciseCards();
    } catch (e) {
      console.error("APIエラー", e);
      alert("種目取得失敗");
    }
  }

  // -----------------------------
  // カード描画
  // -----------------------------
  function renderExerciseCards() {
    const container = document.getElementById("exercise-container");
    container.innerHTML = "";

    selectedExercises.forEach(exId => {
      const ex = exerciseData.find(e => e.id === exId);

      if (!ex) return;

      const card = document.createElement("div");
      card.className = "exercise-card";

      card.innerHTML = `
        <h2>${ex.name}</h2>
        <div class="set-list" id="set-list-${exId}"></div>
        <button class="add-set" onclick="addSet(${exId})">＋ セット追加</button>
      `;

      container.appendChild(card);
      addSet(exId);
    });
  }

  // -----------------------------
  // セット追加
  // -----------------------------
  function addSet(exId) {
    const list = document.getElementById(`set-list-${exId}`);

    const div = document.createElement("div");
    div.className = "set-row";

    div.innerHTML = `
      <input type="number" placeholder="重量(kg)" class="weight">
      <input type="number" placeholder="回数" class="reps">
      <button class="delete-set" onclick="this.parentElement.remove()">削除</button>
    `;

    list.appendChild(div);
  }

  // -----------------------------
  // 保存
  // -----------------------------
  document.getElementById("save-btn").onclick = async () => {

    const today = document.getElementById("training-date").value;

    if (!today) {
      alert("日付を選択してください");
      return;
    }

    const trainingExercises = [];

    selectedExercises.forEach(exId => {
      const rows = document.querySelectorAll(`#set-list-${exId} .set-row`);

      const trainingSets = [];
      let setNumber = 1;

      rows.forEach(row => {
        const weight = row.querySelector(".weight").value;
        const reps = row.querySelector(".reps").value;

        if (weight && reps) {
          trainingSets.push({
            setNumber: setNumber++,
            weight: Number(weight),
            reps: Number(reps)
          });
        }
      });

      if (trainingSets.length > 0) {
        trainingExercises.push({
          exercise: { id: exId },
          trainingSets: trainingSets
        });
      }
    });

    if (trainingExercises.length === 0) {
      alert("1つ以上入力してください");
      return;
    }

    const payload = {
      date: today,
      trainingExercises: trainingExercises
    };

    console.log("送信:", payload);

    try {
      await fetch("http://localhost:8080/trainings/bulk", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      alert("保存しました！");
      window.location.href = "index.html";

    } catch (e) {
      console.error(e);
      alert("保存失敗");
    }
  };

  // -----------------------------
  // 初期化
  // -----------------------------
  window.onload = () => {
    setSelectedDate();   // ← 先に日付復元
    loadExercises();     // ← 次に種目ロード
  };
</script>

</body>
</html>
