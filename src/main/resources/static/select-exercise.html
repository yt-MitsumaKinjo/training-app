<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>種目選択</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .selected-box {
      background: #e8f4ff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .accordion {
      background: #f0f0f0;
      padding: 12px;
      cursor: pointer;
      border-radius: 6px;
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    .panel {
      display: none;
      padding: 10px 15px;
      background: #fafafa;
      border-left: 3px solid #007bff;
      margin-bottom: 10px;
    }

    .exercise-item {
      margin: 5px 0;
    }

    #next-btn {
      margin-top: 30px;
      padding: 12px 20px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>種目選択</h1>

<!-- 選択中の種目一覧 -->
<div class="selected-box">
  <strong>選択中の種目：</strong>
  <div id="selected-list">なし</div>
</div>

<!-- 部位ごとのアコーディオン -->
<div id="accordion-container"></div>

<button id="next-btn">トレーニング追加（画面③へ）</button>

<script>
  let bodyParts = [];
  let selectedExercises = [];

  // -----------------------------
  // ① /bodyparts を取得
  // -----------------------------
  async function loadData() {
    const res = await fetch("http://localhost:8080/bodyparts");
    bodyParts = await res.json();
    renderAccordion();
  }

  // -----------------------------
  // ② アコーディオン表示
  // -----------------------------
  function renderAccordion() {
    const container = document.getElementById("accordion-container");
    container.innerHTML = "";

    bodyParts.forEach(bp => {
      const acc = document.createElement("div");
      acc.className = "accordion";
      acc.textContent = bp.name;
      acc.onclick = () => togglePanel(bp.id);

      const panel = document.createElement("div");
      panel.className = "panel";
      panel.id = `panel-${bp.id}`;

      bp.exercises.forEach(ex => {
        const div = document.createElement("div");
        div.className = "exercise-item";

        div.innerHTML = `
          <label>
            <input type="checkbox" value="${ex.id}" onchange="toggleExercise(${ex.id}, '${ex.name}')">
            ${ex.name}
          </label>
        `;

        panel.appendChild(div);
      });

      container.appendChild(acc);
      container.appendChild(panel);
    });
  }

  // -----------------------------
  // ③ アコーディオン開閉
  // -----------------------------
  function togglePanel(id) {
    const panel = document.getElementById(`panel-${id}`);
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  }

  // -----------------------------
  // ④ 種目選択管理
  // -----------------------------
  function toggleExercise(id, name) {
    if (selectedExercises.some(e => e.id === id)) {
      selectedExercises = selectedExercises.filter(e => e.id !== id);
    } else {
      selectedExercises.push({ id, name });
    }
    updateSelectedList();
  }

  // -----------------------------
  // ⑤ 選択中リスト更新
  // -----------------------------
  function updateSelectedList() {
    const list = document.getElementById("selected-list");

    if (selectedExercises.length === 0) {
      list.textContent = "なし";
      return;
    }

    list.textContent = selectedExercises.map(e => e.name).join("、");
  }

  // -----------------------------
  // ⑥ 次へ（画面③へ）
  // -----------------------------
  document.getElementById("next-btn").onclick = () => {
    if (selectedExercises.length === 0) {
      alert("種目を1つ以上選択してください");
      return;
    }

    localStorage.setItem("selectedExercises", JSON.stringify(selectedExercises.map(e => e.id)));
    window.location.href = "record-set.html";
  };

  loadData();
</script>

</body>
</html>
